server {
    listen 80;
    server_name your-domain.com www.your-domain.com; # Replace with your domain name or VPS IP address

    # Prevent Nginx from serving request payload sizes too small for resume uploads
    client_max_body_size 15M;

    location = /favicon.ico { access_log off; log_not_found off; }

    # Serve Django Static Files directly through Nginx
    location /static/ {
        alias /var/www/CareerAI/staticfiles/;
    }

    # Serve Django Media Uploads (resumes) directly through Nginx
    location /media/ {
        alias /var/www/CareerAI/media/;
    }

    # Forward all other traffic to the Gunicorn Unix Socket
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
